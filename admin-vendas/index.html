<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Vendas | Parceiros</title>
    <script src="../assets/libs/tailwindcss.js"></script>
    <script src="../assets/libs/lucide.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-200">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-700">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Acesso Restrito</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="password" id="secret-key" placeholder="Senha Mestra"
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white focus:border-emerald-500 outline-none">
                <button type="submit"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-colors">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden min-h-screen">
        <header class="bg-slate-800 border-b border-slate-700 p-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-emerald-500/10 p-2 rounded-lg text-emerald-500">
                        <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                    </div>
                    <h1 class="font-bold text-white text-lg">Admin Vendas</h1>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-slate-400">v1.0</span>
                    <button onclick="logout()" class="text-red-400 hover:text-red-300"><i data-lucide="log-out"
                            class="w-5 h-5"></i></button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 lg:p-8">

            <!-- STATS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg">
                    <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">Vendas Totais</p>
                    <h2 class="text-3xl font-black text-white" id="stat-revenue">R$ 0,00</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg">
                    <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">Comissões a Pagar</p>
                    <h2 class="text-3xl font-black text-emerald-400" id="stat-commission">R$ 0,00</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg">
                    <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">Total Pedidos</p>
                    <h2 class="text-3xl font-black text-blue-400" id="stat-count">0</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

                <!-- NEW COUPON FORM -->
                <div class="lg:col-span-1">
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 sticky top-4">
                        <h3 class="font-bold text-white text-lg mb-4 flex items-center gap-2">
                            <i data-lucide="plus-circle" class="w-5 h-5 text-emerald-500"></i> Novo Parceiro/Cupom
                        </h3>
                        <form onsubmit="saveCoupon(event)" class="space-y-4">
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase">Nome do Parceiro</label>
                                <input type="text" id="cp-partner" required
                                    class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white mt-1">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase">CUPOM (Código)</label>
                                <input type="text" id="cp-code" required placeholder="EX: PARCEIRO10"
                                    class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white font-mono uppercase mt-1">
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase">Desconto (%)</label>
                                <input type="number" id="cp-discount" value="10" required
                                    class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white mt-1">
                            </div>
                            <button type="submit"
                                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-emerald-900/20">
                                Criar Cupom
                            </button>
                        </form>
                    </div>
                </div>

                <!-- SALES HISTORY -->
                <div class="lg:col-span-1">
                    <h3 class="font-bold text-white text-lg mb-4 flex items-center gap-2">
                        <i data-lucide="history" class="w-5 h-5 text-orange-500"></i> Últimas Vendas
                    </h3>
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 h-[400px] overflow-y-auto"
                        id="sales-list-container">
                        <p class="text-slate-500 text-center mt-10">Nenhuma venda registrada ainda.</p>
                    </div>
                </div>

                <!-- COUPONS LIST -->
                <div class="lg:col-span-2">
                    <h3 class="font-bold text-white text-lg mb-4 flex items-center gap-2">
                        <i data-lucide="tags" class="w-5 h-5 text-blue-500"></i> Cupons Ativos
                    </h3>
                    <div class="overflow-hidden rounded-2xl border border-slate-700 bg-slate-800">
                        <table class="w-full text-left text-sm text-slate-400">
                            <thead class="bg-slate-900/50 text-slate-200 uppercase font-bold text-xs">
                                <tr>
                                    <th class="p-4">Cupom</th>
                                    <th class="p-4">Parceiro</th>
                                    <th class="p-4">Desconto</th>
                                    <th class="p-4 text-center">Uso</th>
                                    <th class="p-4 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="coupons-list" class="divide-y divide-slate-700">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = '../api_vendas.php';
        let SECRET_KEY = localStorage.getItem('admin_sales_key') || '';

        function init() {
            lucide.createIcons();
            if (SECRET_KEY) {
                checkAuth();
            }
        }

        async function checkAuth() {
            // Simple check by trying to fetch data
            const res = await fetch(`${API_URL}?action=dashboard_stats`, {
                method: 'POST', body: JSON.stringify({ secret: SECRET_KEY })
            });
            const data = await res.json();

            if (data.total_revenue !== undefined) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                renderStats(data);
                loadCoupons();
            } else {
                localStorage.removeItem('admin_sales_key');
                alert('Sessão expirada ou senha incorreta.');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const key = document.getElementById('secret-key').value;
            SECRET_KEY = key;
            localStorage.setItem('admin_sales_key', key);
            checkAuth();
        }

        function logout() {
            localStorage.removeItem('admin_sales_key');
            location.reload();
        }

        function renderStats(data) {
            document.getElementById('stat-revenue').innerText = Number(data.total_revenue).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('stat-commission').innerText = Number(data.total_commission).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('stat-count').innerText = data.sales_count;
        }

        async function loadCoupons() {
            // Fetch Coupons
            const resC = await fetch(`${API_URL}?action=list_coupons`, {
                method: 'POST', body: JSON.stringify({ secret: SECRET_KEY })
            });
            const coupons = await resC.json();

            // Fetch Sales for Stats
            // We need a new action or reuse dashboard_stats if it returns the list
            // For now let's mock it or assume dashboard_stats gave us enough info? 
            // Better: update api_vendas to return recent sales in dashboard_stats.

            // Temporary: We will reuse dashboard_stats to get list of sales for the UI
            // But we need to update the API first. For now, let's keep it simple.

            const list = document.getElementById('coupons-list');
            list.innerHTML = '';

            // Hack: fetch sales via a new call (user needs to update API to support 'list_sales')
            // Let's assume dashboard_stats returns sales list for now (I will update PHP next)
            const resS = await fetch(`${API_URL}?action=dashboard_stats`, {
                method: 'POST', body: JSON.stringify({ secret: SECRET_KEY })
            });
            const statsData = await resS.json();
            const salesList = statsData.recent_sales || [];


            if (Object.keys(coupons).length === 0) {
                list.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-slate-500">Nenhum cupom criado</td></tr>`;
                return;
            }

            for (const key in coupons) {
                const c = coupons[key];
                // Count usage
                const usageCount = salesList.filter(s => s.coupon_used === c.code).length;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-700/30 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 font-mono font-bold text-white">${c.code}</td>
                    <td class="p-4">${c.partner_name}</td>
                    <td class="p-4 text-emerald-400 font-bold">${c.discount}%</td>
                    <td class="p-4 text-center font-bold text-blue-400">${usageCount}</td>
                    <td class="p-4 text-center">
                        <span class="inline-flex items-center px-2 py-1 rounded text-xs font-bold ${c.active ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}">
                            ${c.active ? 'ATIVO' : 'INATIVO'}
                        </span>
                    </td>
                `;
                list.appendChild(tr);
            }

            // Render Recent Sales
            const salesContainer = document.getElementById('sales-list-container');
            if (salesContainer && salesList.length > 0) {
                let html = '';
                // Show last 10
                salesList.slice(-10).reverse().forEach(s => {
                    html += `
                    <div class="flex items-center justify-between p-3 bg-slate-700/50 rounded-lg mb-2 border border-slate-600">
                        <div>
                            <p class="font-bold text-white text-sm">${s.product.toUpperCase()}</p>
                            <p class="text-xs text-slate-400">${s.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-emerald-400">R$ ${s.amount}</p>
                            <p class="text-[10px] text-slate-500">${s.status}</p>
                        </div>
                    </div>
                   `;
                });
                salesContainer.innerHTML = html;
            }
        }

        async function saveCoupon(e) {
            e.preventDefault();
            const data = {
                action: 'save_coupon',
                secret: SECRET_KEY,
                code: document.getElementById('cp-code').value,
                partner_name: document.getElementById('cp-partner').value,
                discount: document.getElementById('cp-discount').value
            };

            const res = await fetch(API_URL, {
                method: 'POST', body: JSON.stringify(data)
            });
            const result = await res.json();

            if (result.status === 'success') {
                alert('Cupom criado com sucesso!');
                e.target.reset();
                loadCoupons();
            } else {
                alert('Erro ao criar cupom.');
            }
        }

        init();
    </script>
</body>

</html>
